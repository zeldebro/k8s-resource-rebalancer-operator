apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/name: rebalancer
    app.kubernetes.io/managed-by: kustomize
  name: rebalancer-rb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rebalancer-role
subjects:
- kind: ServiceAccount
  name: rebalancer-sa
  namespace: system
