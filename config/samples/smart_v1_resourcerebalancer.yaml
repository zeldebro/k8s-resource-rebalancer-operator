apiVersion: rebalancer.dev/v1
kind: ResourceRebalancer
metadata:
  labels:
    app.kubernetes.io/name: rebalancer
    app.kubernetes.io/managed-by: kustomize
  name: resourcerebalancer-sample
spec:
  # Namespace to monitor for idle pods
  userNamespace: "default"
  # CPU usage threshold in millicores — pods below this are considered idle
  cpuThreshold: 50
  # Memory usage threshold in MiB — pods below this are considered idle
  memoryThreshold: 500
  # Set to true to enable automatic scale-down of idle deployments
  enableCleanup: true
